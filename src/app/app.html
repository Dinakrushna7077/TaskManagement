<h2 class="bg-secondary text-light p-2 text-center">{{title()}}</h2>
<div class="d-flex align-items-center justify-content-center h-100 w-100">
  <div class="d-flex align-items-center justify-content-between gap-4 pt-2 pb-2  h-100 w-25 flex-column bg-success rounded-2 bg-opacity-50 p-2">
    <h3 class="fw-bolder">{{caption()}}</h3>
    <input type="text" [(ngModel)]="task" placeholder="Enter Task" id="taskInput" class="form-control">
    <input type="date" [(ngModel)]="date" id="dateInput" class="form-control">
    <div class="d-flex gap-4 align-items-center">
      <div class="w-50"><b>Hours</b><input type="number" [(ngModel)]="hh" id="hhInput" class="form-control"> </div>
      <div class="w-50"><b>Minutes</b><input type="number" [(ngModel)]="mm" id="mmInput" class="form-control"> </div>
    </div>
      <span class={{msgClass}}>{{ message() }}</span>
    <div class="d-flex gap-4">
        <button (click)="updateId!=0? cancelEdit():setDefaultValue()" class="bg-primary rounded-2 px-3 border-0 fw-bold text-white">{{ updateId != 0 ? 'Cancel' : 'Reset' }}
        </button>
      <button (click)="updateId != 0 ? formValidation()?updateTask(updateId):'' : formValidation()? addTask():''"
        class="btn btn-success bg-opacity-50 fw-bolder">
        {{ updateId != 0 ? 'Update' : 'Add' }}
      </button>
  </div>
    </div>
</div>


<div class="d-flex align-items-center  gap-4 pt-2 pb-2 h-100 w-100 flex-wrap px-5">
@for(t of taskList;track t)
{
<div class="d-flex align-items-center gap-3 pt-2 pb-2 bg-secondary bg-opacity-50 p-2 rounded-2 h-25 w-25 flex-column flex-wrap">
    <div class="fw-bold fs-2">
      {{t.task}}
    </div>
    <div>
      <b>Duration : <span>{{t.hh}} HH</span> : <span>{{t.mm}} MM</span></b>
    </div>
    <div class="d-flex align-items-center justify-content-between gap-4 pt-2 pb-2  h-100 w-100">
      <span class="text-dark">Created At : 
        {{t.date}}
      </span>
      <div class="d-flex align-items-center justify-content-end gap-3 pt-2 pb-2  h-100 w-100 ">
        <button class="rounded-2 w-25 bg-primary text-white fw-bold border-0 p-1" (click)="editTask(t.id)">Edit</button>
        <button class=" bg-danger rounded-2 text-white w-25 fw-bold border-0 p-1" (click)="deleteTask($index)">Delete</button>
      </div>
    </div>
</div>
  }
